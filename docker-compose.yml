
services:

  db:
    image: postgres:15
    container_name: drafthub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drafthub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drafthub_pass}
      POSTGRES_DB: ${POSTGRES_DB:-drafthub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drafthub_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drafthub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: drafthub_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - uploads_data:/app/backend/uploads
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  uploads_data: