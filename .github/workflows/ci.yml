name: DraftHub CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: drafthub_user
          POSTGRES_PASSWORD: drafthub_pass
          POSTGRES_DB: drafthub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_USER: drafthub_user
          POSTGRES_PASSWORD: drafthub_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: drafthub
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          UPLOAD_DIR: uploads
          GMAIL_USER: test@gmail.com
          GMAIL_APP_PASSWORD: testpassword
          RESEND_API_KEY: test
          RESEND_FROM_EMAIL: test@test.com
        run: pytest tests/ -v

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t drafthub-backend .